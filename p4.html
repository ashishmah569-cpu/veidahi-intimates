<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>UrbanBloom Brief</title>

<style>
body{
  margin:0;
  font-family:Arial, sans-serif;
  background:#f5f5f5;
}

.container{
  display:flex;
  gap:50px;
  max-width:1100px;
  margin:60px auto;
  padding:30px;
  background:white;
  box-shadow:0 5px 20px rgba(0,0,0,0.08);
  border-radius:10px;
}

.left{width:50%;}
.right{width:50%;}

#mainImage{
  width:100%;
  border-radius:8px;
  transition:0.4s;
}
#mainImage:hover{transform:scale(1.03);}

.thumbs{
  display:flex;
  gap:10px;
  margin-top:15px;
}

.thumbs img{
  width:70px;
  cursor:pointer;
  border-radius:6px;
}

.color-icons{
  display:flex;
  gap:12px;
  margin-top:10px;
}

.color-dot{
  width:30px;
  height:30px;
  border-radius:50%;
  cursor:pointer;
  border:2px solid #ddd;
}

.color-dot.active{
  border:3px solid black;
  transform:scale(1.2);
}

.price{
  font-size:20px;
  margin:10px 0;
  color:#444;
}

.combo-box{
  background:#fff5f8;
  padding:20px;
  border-radius:15px;
  margin-top:20px;
  text-align:center;
  box-shadow:0 8px 20px rgba(0,0,0,0.08);
}

select, input{
  padding:10px;
  margin-top:10px;
  width:220px;
}

button{
  margin-top:20px;
  padding:12px;
  width:220px;
  background:black;
  color:white;
  border:none;
  cursor:pointer;
  border-radius:5px;
  font-size:16px;
}
</style>
</head>

<body>

<div class="container">

<div class="left">
  <img id="mainImage" src="">
  <div class="thumbs" id="thumbs"></div>
</div>

<div class="right">
  <h2>UrbanBloom Brief</h2>

  <p class="price"><b>Price:</b> ₹90</p>

  <div style="margin:8px 0; font-size:14px;">
  ★★★★★ <span style="color:#777;">(4.8/5 • 124 Reviews)</span>
  </div>

  <p id="stockStatus" style="color:green; font-weight:bold;">
  ✔ In Stock
  </p>

  <p style="font-size:13px; color:#555;">
  🚚 Free Delivery in 3-5 Days | Easy Returns
  </p>

  <button onclick="toggleWishlist()" id="wishBtn" 
  style="background:#fff; color:black; border:1px solid #ccc;">
  ♡ Add to Wishlist
  </button>

  <div style="margin-top:20px; font-size:14px; color:#444; line-height:1.6;">
  <b>Product Description:</b><br>
  Elegant everyday bralette crafted for comfort and confidence.
  Lightweight stretch fabric with breathable support.
  </div>

 <div class="combo-box">
  <h3>🔥 3 Set Combo Offer</h3>
  <p><del>₹270</del> ₹159</p>
  <p>Save ₹111</p>
  <button onclick="orderNow()">Buy 3 Set Combo</button>
</div>

  <label><b>Choose Color:</b></label>
  <div class="color-icons" id="colorIcons"></div>

  <br>

  <label>Select Size:</label><br>
  <select id="sizeSelect">
    <option>34</option>
    <option>36</option>
    <option>38</option>
    <option>40</option>
  </select>

  <br>
  <input type="text" id="custName" placeholder="Your Name">
  <input type="text" id="custPhone" placeholder="Phone Number">
  <input type="text" id="custAddress" placeholder="Address">

<button onclick="orderNow()">Order on WhatsApp</button>
</div>
</div>

<script>

const images = {
bebypink:["p4-bebypink-1.jpg","p4-bebypink-2.jpg","p4-bebypink-3.jpg","p4-bebypink-4.jpg"],
moonred:["p4-moonred-1.jpg","p4-moonred-2.jpg","p4-moonred-3.jpg","p4-moonred-4.jpg"],
teal:["p4-teal-1.jpg","p4-teal-2.jpg","p4-teal-3.jpg","p4-teal-4.jpg"]
};

const mainImage = document.getElementById("mainImage");
const thumbs = document.getElementById("thumbs");
const colorIcons = document.getElementById("colorIcons");

let currentColor = "bebypink";

function loadImages(color){
currentColor = color;
thumbs.innerHTML = "";

images[color].forEach(function(img,index){
if(index===0){ mainImage.src = img; }

const t = document.createElement("img");
t.src = img;
t.onclick = function(){ mainImage.src = img; };
thumbs.appendChild(t);
});

highlightActive(color);
}

const colorMap = {
bebypink:"#ffb6c1",
moonred:"#8b0000",
teal:"#008080"
};

Object.keys(images).forEach(color=>{
const dot = document.createElement("div");
dot.classList.add("color-dot");
dot.style.background = colorMap[color];
dot.setAttribute("data-color", color);
dot.onclick = function(){ loadImages(color); };
colorIcons.appendChild(dot);
});

function highlightActive(activeColor){
document.querySelectorAll(".color-dot").forEach(dot=>{
dot.classList.remove("active");
});
const active = document.querySelector('.color-dot[data-color="'+activeColor+'"]');
if(active){ active.classList.add("active"); }
}

loadImages("bebypink");

/* ===== ORDER FUNCTION ===== */

function orderNow(){

const name = document.getElementById("custName").value.trim();
const phone = document.getElementById("custPhone").value.trim();
const address = document.getElementById("custAddress").value.trim();
const size = document.getElementById("sizeSelect").value;

if(name === "" || phone === "" || address === ""){
alert("Please fill all details");
return;
}

const productName = document.querySelector("h2").innerText;

const message =
"🛍️ NEW ORDER 🛍️\n\n"+
"📌 Product: " + productName + "\n"+
"🎨 Color: " + currentColor + "\n"+
"📏 Size: " + size + "\n"+
"💰 Single Price: ₹90\n"+
"🔥 Combo Price: ₹159\n\n"+
"👤 Name: " + name + "\n"+
"📞 Phone: " + phone + "\n"+
"📍 Address: " + address;

const url = "https://wa.me/918750020203?text=" + encodeURIComponent(message);

window.open(url, "_blank");
}

/* ===== WISHLIST ===== */

function toggleWishlist(){
const btn = document.getElementById("wishBtn");
if(btn.innerHTML.includes("♡")){
btn.innerHTML="♥ Added to Wishlist";
btn.style.color="red";
}else{
btn.innerHTML="♡ Add to Wishlist";
btn.style.color="black";
}
}

/* ===== STOCK ===== */

function checkStock(){
const stock = Math.floor(Math.random()*5);
if(stock < 1){
document.getElementById("stockStatus").innerHTML = "✖ Out of Stock";
document.getElementById("stockStatus").style.color = "red";
}
}
checkStock();

</script>
</body>
</html>
