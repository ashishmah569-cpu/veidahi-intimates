<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Veidahi Intimates</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;800&display=swap" rel="stylesheet">

<style>
:root{
--primary:#d2235b;
--primary-soft:#fbe7ee;
--dark:#111;
--soft:#fff5f8;
--light:#fafafa;
}

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
font-family:'Poppins',sans-serif;
background:#fff;
color:var(--dark);
scroll-behavior:smooth;
line-height:1.6;
}

/* ================= NAV ================= */

nav{
background:#fff;
padding:20px 60px;
display:flex;
justify-content:space-between;
align-items:center;
position:sticky;
top:0;
z-index:1000;
box-shadow:0 8px 25px rgba(0,0,0,0.05);
}

nav h2{
font-weight:800;
letter-spacing:2px;
font-size:20px;
}

nav a{
color:var(--dark);
text-decoration:none;
margin-left:35px;
font-size:14px;
font-weight:500;
position:relative;
transition:.3s;
}

nav a::after{
content:"";
position:absolute;
width:0;
height:2px;
background:var(--primary);
bottom:-6px;
left:0;
transition:.3s;
}

nav a:hover{
color:var(--primary);
}

nav a:hover::after{
width:100%;
}

/* ================= HERO ================= */

.hero{
height:100vh;
background:
linear-gradient(rgba(210,35,91,0.25), rgba(0,0,0,0.6)),
url("hero.jpg");
background-size:cover;
background-position:center;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
text-align:center;
color:#fff;
padding:0 20px;
}

.hero h1{
font-size:65px;
font-weight:800;
letter-spacing:2px;
margin-bottom:15px;
}

.hero-tagline{
max-width:600px;
font-size:16px;
opacity:0.9;
}

.hero-btn{
margin-top:30px;
padding:16px 45px;
background:var(--primary);
color:#fff;
border:none;
border-radius:40px;
font-weight:600;
cursor:pointer;
transition:.3s;
}

.hero-btn:hover{
transform:translateY(-5px);
box-shadow:0 15px 35px rgba(210,35,91,0.4);
}

/* ================= SECTION TITLE ================= */

section h2{
font-size:32px;
font-weight:800;
margin-bottom:20px;
letter-spacing:1px;
}

/* ================= NEW ARRIVALS ================= */

.new-arrivals{
padding:100px 20px;
background:var(--soft);
text-align:center;
}

.slider{
max-width:1250px;
margin:50px auto;
overflow:hidden;
}

.slider-track{
display:flex;
gap:25px;
transition:transform 0.6s ease-in-out;
}

.arrival-card{
min-width:280px;
background:#fff;
border-radius:25px;
overflow:hidden;
box-shadow:0 20px 40px rgba(0,0,0,0.08);
transition:.4s;
flex-shrink:0;
}

.arrival-card:hover{
transform:translateY(-8px);
}

.arrival-card img{
width:100%;
height:320px;
object-fit:cover;
transition:.5s;
}

.arrival-card:hover img{
transform:scale(1.08);
}

.arrival-card h3{
margin:18px 0 10px;
font-weight:600;
}

.arrival-card button{
margin-bottom:20px;
padding:10px 28px;
background:var(--dark);
color:#fff;
border:none;
border-radius:30px;
cursor:pointer;
transition:.3s;
}

.arrival-card button:hover{
background:var(--primary);
}

@media(max-width:768px){
.arrival-card{
min-width:90%;
}
}

/* ================= PRODUCTS ================= */

.products{
padding:100px 20px;
max-width:1200px;
margin:auto;
text-align:center;
}

.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(260px,1fr));
gap:35px;
margin-top:50px;
}

.card{
background:#fff;
border-radius:25px;
padding:20px;
box-shadow:0 15px 35px rgba(0,0,0,0.06);
transition:.4s;
}

.card:hover{
transform:translateY(-8px);
}

.card img{
width:100%;
height:300px;
object-fit:cover;
border-radius:18px;
}

.card h3{
margin:15px 0 8px;
}

.card p{
font-weight:600;
color:var(--primary);
}

.card button{
margin-top:12px;
padding:10px 28px;
background:var(--dark);
color:#fff;
border:none;
border-radius:30px;
cursor:pointer;
transition:.3s;
}

.card button:hover{
background:var(--primary);
}

/* ================= WHY CHOOSE ================= */

.features{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(260px,1fr));
gap:35px;
margin-top:50px;
}

.feature-box{
background:#fff;
padding:35px 25px;
border-radius:25px;
box-shadow:0 12px 30px rgba(0,0,0,0.06);
transition:.4s;
}

.feature-box:hover{
transform:translateY(-8px);
}

.feature-box h3{
color:var(--primary);
margin-bottom:10px;
}

.feature-box p{
font-size:14px;
color:#555;
}

/* ================= ABOUT ================= */

.section{
padding:100px 20px;
text-align:center;
background:var(--light);
}

.section p{
max-width:850px;
margin:20px auto;
color:#444;
}

/* ================= REVIEWS ================= */

.reviews{
padding:100px 20px;
background:#faf7f8;
text-align:center;
}

.review-grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(260px,1fr));
gap:35px;
max-width:1100px;
margin:50px auto;
}

.review-card{
background:#fff;
padding:35px 25px;
border-radius:25px;
box-shadow:0 15px 35px rgba(0,0,0,0.08);
transition:.4s;
}

.review-card:hover{
transform:translateY(-8px);
}

.review-card p{
margin-bottom:15px;
color:#444;
font-size:14px;
}

.review-card h4{
color:var(--primary);
font-size:14px;
}

.review-card span{
color:#888;
}

/* ================= MODAL ================= */

.modal{
display:none;
position:fixed;
inset:0;
background:rgba(0,0,0,0.8);
justify-content:center;
align-items:center;
flex-direction:column;
z-index:200;
}

.modal img{
max-width:80%;
max-height:70vh;
border-radius:15px;
margin-bottom:20px;
}

.modal button{
padding:10px 20px;
margin:5px;
border:none;
border-radius:25px;
cursor:pointer;
}
<script>

/* AUTO SLIDER FIX */
let sliderTrack = document.querySelector(".slider-track");
let slideIndex = 0;

function autoSlide(){
  let cards = document.querySelectorAll(".arrival-card");
let cardWidth = cards[0].getBoundingClientRect().width + 20

  slideIndex++;

  if(slideIndex > cards.length - 3){
    slideIndex = 0;
  }

  sliderTrack.style.transform =
    "translateX(-" + (slideIndex * cardWidth) + "px)";
}

setInterval(autoSlide,3000);

/* GALLERY */
let currentImages=[];
let currentIndex=0;

function openGallery(images){
  currentImages = images;
  currentIndex = 0;
  document.getElementById("galleryImage").src = currentImages[0];
  document.getElementById("galleryModal").style.display="flex";
}

function closeGallery(){
  document.getElementById("galleryModal").style.display="none";
}

function nextImage(){
  currentIndex = (currentIndex+1) % currentImages.length;
  document.getElementById("galleryImage").src =
    currentImages[currentIndex];
}

function prevImage(){
  currentIndex =
    (currentIndex-1+currentImages.length) % currentImages.length;
  document.getElementById("galleryImage").src =
    currentImages[currentIndex];
}

</script>

</body>
</html>
