<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>UrbanBloom Brief</title>

<style>
body{
  margin:0;
  font-family:Arial, sans-serif;
  background:#f5f5f5;
}

.container{
  display:flex;
  gap:50px;
  max-width:1100px;
  margin:60px auto;
  padding:30px;
  background:white;
  box-shadow:0 5px 20px rgba(0,0,0,0.08);
  border-radius:10px;
}

.left{width:50%;}
.right{width:50%;}

#mainImage{
  width:100%;
  border-radius:8px;
  transition:0.4s;
}
#mainImage:hover{transform:scale(1.03);}

.thumbs{
  display:flex;
  gap:10px;
  margin-top:15px;
}

.thumbs img{
  width:70px;
  cursor:pointer;
  border-radius:6px;
  transition:0.3s;
}

.thumbs img:hover{
  transform:scale(1.1);
}

.color-icons{
  display:flex;
  gap:12px;
  margin-top:10px;
}

.color-dot{
  width:30px;
  height:30px;
  border-radius:50%;
  cursor:pointer;
  border:2px solid #ddd;
  transition:0.3s;
}

.color-dot.active{
  border:3px solid black;
  transform:scale(1.2);
}

.price{
  font-size:20px;
  margin:10px 0;
  color:#444;
}

.combo-box{
  background:#fff5f8;
  padding:20px;
  border-radius:15px;
  margin-top:20px;
  text-align:center;
  box-shadow:0 8px 20px rgba(0,0,0,0.08);
}

.combo-box h3{
  margin-bottom:10px;
  color:#b3003c;
}

.combo-box del{
  color:gray;
  margin-right:8px;
}

select, input{
  padding:10px;
  margin-top:10px;
  width:220px;
}

button{
  margin-top:20px;
  padding:12px;
  width:220px;
  background:black;
  color:white;
  border:none;
  cursor:pointer;
  border-radius:5px;
  font-size:16px;
}
button:hover{opacity:0.8;}
</style>
</head>

<body>

<div class="container">

<div class="left">
  <img id="mainImage" src="">
  <div class="thumbs" id="thumbs"></div>
</div>

<div class="right">
  <h2>UrbanBloom Brief</h2>

  <p class="price"><b>Price:</b> ₹90</p>

  <div class="combo-box">
    <h3>3 Set Combo Offer</h3>
    <p><del>₹270</del> ₹159</p>
    <p>Save ₹111</p>
  </div>

  <label><b>Choose Color:</b></label>
  <div class="color-icons" id="colorIcons"></div>

  <br>

  <label>Select Size:</label><br>
  <select id="sizeSelect">
    <option>34</option>
    <option>36</option>
    <option>38</option>
    <option>40</option>
  </select>

  <br>
  <input type="text" id="custName" placeholder="Your Name">
  <input type="text" id="custPhone" placeholder="Phone Number">
  <input type="text" id="custAddress" placeholder="Address">

  <button onclick="orderNow()">Order on WhatsApp</button>

</div>
</div>

<script>

/* IMAGES */
const images = {
chocolate:[
"p7-chocolate-1.jpg",
"p7-chocolate-2.jpg",
"p7-chocolate-3.jpg",
"p7-chocolate-4.jpg"
],
grey:[
"p7-grey-1.jpg",
"p7-grey-2.jpg",
"p7-grey-3.jpg",
"p7-grey-4.jpg"
],
merhoon:[
"p7-merhoon-1.jpg",
"p7-merhoon-2.jpg",
"p7-merhoon-3.jpg",
"p7-merhoon-4.jpg"
]
};

const mainImage = document.getElementById("mainImage");
const thumbs = document.getElementById("thumbs");
const colorIcons = document.getElementById("colorIcons");

let currentColor = "chocolate";

/* LOAD IMAGES */
function loadImages(color){

currentColor = color;
thumbs.innerHTML = "";

images[color].forEach(function(img,index){

if(index===0){
mainImage.src = img;
}

const t = document.createElement("img");
t.src = img;
t.onclick = function(){
mainImage.src = img;
};

thumbs.appendChild(t);

});

highlightActive(color);
}

/* COLOR MAP */
const colorMap = {
chocolate:"#5c3317",
grey:"#808080",
merhoon:"#800000"
};

/* CREATE COLOR DOTS */
Object.keys(images).forEach(color => {

const dot = document.createElement("div");
dot.classList.add("color-dot");
dot.style.background = colorMap[color];
dot.setAttribute("data-color", color);

dot.onclick = function(){
loadImages(color);
};

colorIcons.appendChild(dot);

});

/* ACTIVE DOT */
function highlightActive(activeColor){

document.querySelectorAll(".color-dot").forEach(dot=>{
dot.classList.remove("active");
});

const active = document.querySelector('.color-dot[data-color="'+activeColor+'"]');
if(active){
active.classList.add("active");
}

}

/* INIT */
loadImages("chocolate");

/* WHATSAPP ORDER */
function orderNow(){

const name = document.getElementById("custName").value;
const phone = document.getElementById("custPhone").value;
const address = document.getElementById("custAddress").value;
const size = document.getElementById("sizeSelect").value;

if(name==="" || phone==="" || address===""){
alert("Please fill all details");
return;
}

const imageURL = "https://ashishmah569-cpu.github.io/veidahi-intimates/" + images[currentColor][0];

const message =
"🛍️ NEW ORDER RECEIVED 🛍️%0A%0A"+
"📌 Product: Classic Comfort Bra%0A"+
"🎨 Color: "+currentColor+"%0A"+
"📏 Size: "+size+"%0A"+
"💰 Price: ₹189%0A"+
"🖼️ Image: "+imageURL+"%0A%0A"+
"Name: "+name+"%0A"+
"Phone: "+phone+"%0A"+
"Address: "+address;

window.open("https://wa.me/918750020203?text="+message,"_blank");

}

</script>

</body>
</html>
