<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Veidahi Intimates</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'Segoe UI', Arial, sans-serif;background:#fff;color:#111;}

/* NAV */
nav{
  background:#000;
  padding:18px 40px;
  display:flex;
  justify-content:space-between;
  align-items:center;
}
nav h2{color:#fff;}
nav a{color:white;text-decoration:none;margin-left:25px;font-size:14px;}
nav a:hover{color:#ff4d88;}

/* HERO */
.hero{
  height:100vh;
  background:linear-gradient(rgba(255,77,136,0.2), rgba(0,0,0,0.5)), url("hero.jpg");
  background-size:cover;
  background-position:center;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  color:white;
  text-align:center;
}
.hero h1{font-size:60px;}
.hero button{
  margin-top:30px;
  padding:14px 35px;
  background:#ff4d88;
  color:white;
  border:none;
  border-radius:30px;
  cursor:pointer;
}

/* NEW ARRIVALS */
.new-arrivals{
  padding:80px 20px;
  background:#fff0f5;
  text-align:center;
}

.arrival-slider{
  max-width:1200px;
  margin:40px auto;
  overflow:hidden;
}

.arrival-track{
  display:flex;
  gap:30px;
  transition:transform 0.6s ease-in-out;
}

.arrival-card{
  min-width:calc(33.33% - 20px);
  background:white;
  border-radius:18px;
  overflow:hidden;
  box-shadow:0 10px 25px rgba(0,0,0,0.08);
  position:relative;
  text-align:center;
}

.arrival-card img{
  width:100%;
  height:300px;
  object-fit:cover;
}

.arrival-card h3{
  margin:15px 0;
}

.arrival-card button{
  margin-bottom:20px;
  padding:8px 20px;
  background:#000;
  color:white;
  border:none;
  border-radius:20px;
  cursor:pointer;
}

.arrival-card button:hover{
  background:#ff4d88;
}

.badge{
  position:absolute;
  top:15px;
  left:15px;
  background:#ff4d88;
  color:white;
  padding:5px 12px;
  font-size:12px;
  border-radius:20px;
}

/* Responsive */
@media(max-width:900px){
  .arrival-card{min-width:calc(50% - 15px);}
}

@media(max-width:600px){
  .arrival-card{min-width:100%;}
}
</style>
</head>

<body>

<nav>
  <h2>VEIDAHI INTIMATES</h2>
  <div>
    <a href="#">Home</a>
    <a href="#">Products</a>
  </div>
</nav>

<section class="hero">
  <h1>Veidahi Intimates</h1>
  <button>Explore Collection</button>
</section>

<!-- NEW ARRIVALS -->
<section class="new-arrivals">
  <h2>✨ New Arrivals</h2>

  <div class="arrival-slider">
    <div class="arrival-track">

      <div class="arrival-card">
        <span class="badge">NEW</span>
        <img src="na1-1.jpg">
        <h3>Sports Bra</h3>
        <button>View Product</button>
      </div>

      <div class="arrival-card">
        <span class="badge">NEW</span>
        <img src="na2-1.jpg">
        <h3>Gym Sports Wear</h3>
        <button>View Product</button>
      </div>

      <div class="arrival-card">
        <span class="badge">NEW</span>
        <img src="na3-1.jpg">
        <h3>Running Sports Bra</h3>
        <button>View Product</button>
      </div>

      <div class="arrival-card">
        <span class="badge">NEW</span>
        <img src="na4-1.jpg">
        <h3>Bold Hipster</h3>
        <button>View Product</button>
      </div>

    </div>
  </div>
</section>

<script>
document.addEventListener("DOMContentLoaded", function () {

  const track = document.querySelector(".arrival-track");
  const cards = document.querySelectorAll(".arrival-card");

  let index = 0;
  let interval;

  function getVisibleCards() {
    if (window.innerWidth <= 600) return 1;
    if (window.innerWidth <= 900) return 2;
    return 3;
  }

  function updateSlider() {
    const visible = getVisibleCards();
    const total = cards.length;

    if (index >= total - visible) {
      index = 0;
    } else {
      index++;
    }

    const cardWidth = cards[0].offsetWidth + 30;
    track.style.transform = "translateX(-" + (index * cardWidth) + "px)";
  }

  interval = setInterval(updateSlider, 3000);

  window.addEventListener("resize", function () {
    index = 0;
    track.style.transform = "translateX(0px)";
  });

});
</script>
</body>
</html>
