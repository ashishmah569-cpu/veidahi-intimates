<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Veidahi Intimates | Luxury Lingerie</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;800&display=swap" rel="stylesheet">

<style>

:root{
--primary:#b3003c;
--soft:#fff5f8;
}

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
font-family:'Poppins',sans-serif;
background:#fff;
color:#111;
}

nav{
background:#fff;
padding:20px 60px;
display:flex;
justify-content:space-between;
align-items:center;
box-shadow:0 8px 25px rgba(0,0,0,0.05);
}

section{
padding:80px 20px;
text-align:center;
}

section h2{
font-size:30px;
margin-bottom:40px;
}

.hero{
height:90vh;
background:url("hero.jpg") center/cover no-repeat;
display:flex;
justify-content:center;
align-items:center;
flex-direction:column;
color:white;
text-shadow:0 5px 20px rgba(0,0,0,0.5);
}

.hero h1{
font-size:55px;
}

.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
gap:25px;
max-width:1200px;
margin:auto;
}

.card{
background:white;
padding:15px;
border-radius:20px;
box-shadow:0 12px 30px rgba(0,0,0,0.08);
cursor:pointer;
text-align:center;
}

.product{
width:100%;
height:320px;
overflow:hidden;
border-radius:15px;
}

.product img{
width:100%;
height:100%;
object-fit:cover;
}

.price{
font-weight:600;
margin-top:10px;
}

.soft{
background:var(--soft);
}

/* NEW ARRIVAL SCROLL */

.slider{
overflow-x:auto;
scroll-behavior:smooth;
max-width:1200px;
margin:auto;
}

.slides{
display:flex;
gap:20px;
}

.slides .card{
min-width:250px;
flex-shrink:0;
}

/* POPUP */

.popup{
display:none;
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.6);
justify-content:center;
align-items:center;
z-index:999;
}

.popup-box{
background:#fff;
width:90%;
max-width:900px;
display:flex;
padding:20px;
gap:20px;
border-radius:20px;
}

.popup-left img{
width:300px;
border-radius:15px;
}

.thumbs img{
width:60px;
margin:5px;
cursor:pointer;
border-radius:10px;
}

.popup-right{
flex:1;
text-align:left;
}

.popup-right select{
width:100%;
padding:8px;
margin:8px 0;
}

.buy-btn, .whatsapp-btn{
margin-top:10px;
padding:10px 15px;
border:none;
background:var(--primary);
color:white;
cursor:pointer;
width:100%;
}

footer{
background:#111;
color:white;
padding:25px;
text-align:center;
}

</style>
</head>

<body>

<nav>
<h2>VEIDAHI</h2>
</nav>

<section class="hero">
<h1>Luxury Lingerie</h1>
<p>Confidence begins underneath</p>
</section>

<!-- NEW ARRIVALS -->

<section class="soft">
<h2>New Arrivals</h2>

<div class="slider">
<div class="slides">

<div class="card">
<div class="product">
<img src="na1-1.jpg">
</div>
<h3>Sports Bra</h3>
</div>

<div class="card">
<div class="product">
<img src="na2-1.jpg">
</div>
<h3>Gymer Bra</h3>
</div>

</div>
</div>
</section>

<!-- COLLECTION -->

<section>
<h2>Our Collection</h2>

<div class="grid">

<div class="card"
data-name="Classic Carek - 3 Set Combo"
data-price="₹229"
data-images="p1-burgundy-1.jpg,p1-green-1.jpg,p1-red-1.jpg">

<div class="product">
<img src="p1-burgundy-1.jpg">
</div>

<h3>Classic Carek - 3 Set Combo</h3>
<p class="price">₹229</p>
</div>

<div class="card"
data-name="Camisol - 3 Set Combo"
data-price="₹259"
data-images="p2-new-brown-1.jpg,p2-new-grey-1.jpg,p2-new-red-1.jpg">

<div class="product">
<img src="p2-new-brown-1.jpg">
</div>

<h3>Camisol - 3 Set Combo</h3>
<p class="price">₹259</p>
</div>

</div>
</section>

<!-- POPUP -->

<div class="popup" id="productPopup">
<div class="popup-box">

<span class="close" style="cursor:pointer;font-size:20px;">&times;</span>

<div class="popup-left">
<img id="mainImage" src="">
<div class="thumbs" id="thumbContainer"></div>
</div>

<div class="popup-right">
<h2 id="popupName"></h2>
<p id="popupPrice"></p>

<label>Color:</label>
<select id="colorSelect"></select>

<label>Size:</label>
<select>
<option>S</option>
<option>M</option>
<option>L</option>
<option>XL</option>
</select>

<button class="buy-btn">Add to Cart</button>
<a id="whatsappBtn" target="_blank">
<button class="whatsapp-btn">Order on WhatsApp</button>
</a>

</div>

</div>
</div>

<footer>
© 2026 Veidahi Intimates | Delhi
</footer>

<script>

const popup = document.getElementById("productPopup");
const mainImage = document.getElementById("mainImage");
const popupName = document.getElementById("popupName");
const popupPrice = document.getElementById("popupPrice");
const thumbContainer = document.getElementById("thumbContainer");
const colorSelect = document.getElementById("colorSelect");
const whatsappBtn = document.getElementById("whatsappBtn");

document.querySelectorAll(".grid .card").forEach(card=>{

card.addEventListener("click",()=>{

let name = card.dataset.name;
let price = card.dataset.price;
let images = card.dataset.images.split(",");

popupName.innerText = name;
popupPrice.innerText = price;
mainImage.src = images[0];

thumbContainer.innerHTML = "";
colorSelect.innerHTML = "";

images.forEach((img,i)=>{

let thumb = document.createElement("img");
thumb.src = img;
thumb.onclick = ()=> mainImage.src = img;
thumbContainer.appendChild(thumb);

let option = document.createElement("option");
option.value = img;
option.text = "Color " + (i+1);
colorSelect.appendChild(option);

});

colorSelect.onchange = function(){
mainImage.src = this.value;
};

whatsappBtn.href = "https://wa.me/918750020203?text=I want to order " + name;

popup.style.display = "flex";

});

});

document.querySelector(".close").onclick = ()=>{
popup.style.display = "none";
};

window.onclick = function(e){
if(e.target == popup){
popup.style.display = "none";
}
};

</script>

</body>
</html>
