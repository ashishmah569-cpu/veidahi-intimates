<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Camisole</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:Arial,sans-serif;background:#fff;color:#111;}

header{
padding:16px;
border-bottom:1px solid rgba(0,0,0,0.08);
position:sticky;
top:0;
background:#fff;
z-index:10;
}

.brand{font-weight:900;font-size:18px;}

.wrap{max-width:1200px;margin:auto;padding:24px 16px 60px;}

.back{
display:inline-block;
padding:10px 14px;
border-radius:999px;
border:1px solid rgba(0,0,0,0.12);
text-decoration:none;
color:#111;
font-weight:800;
font-size:13px;
}

h1{font-size:26px;margin-bottom:8px;}
.sub{color:#555;font-size:14px;margin-bottom:16px;}

.grid{
display:grid;
grid-template-columns:1.2fr 0.8fr;
gap:18px;
align-items:start;
}

.gallery{
display:grid;
grid-template-columns:repeat(2,1fr);
gap:12px;
}

.gallery img{
width:100%;
height:320px;
object-fit:cover;
border-radius:18px;
border:1px solid rgba(0,0,0,0.08);
}

.details{
border-radius:22px;
padding:18px;
border:1px solid rgba(0,0,0,0.08);
background:#fff;
position:sticky;
top:95px;
}

.price{
font-size:20px;
font-weight:900;
color:#d2235b;
margin:12px 0;
}

/* COMBO BOX */
.combo-box{
margin-top:15px;
padding:15px;
background:#fff0f4;
border-radius:14px;
border:1px solid rgba(0,0,0,0.08);
text-align:center;
}

.combo-box h3{
margin-bottom:8px;
color:#d2235b;
}

.offer{
background:#ffedf1;
color:#d2235b;
padding:8px 12px;
border-radius:12px;
font-weight:700;
margin-bottom:12px;
display:inline-block;
}

input, select{
width:100%;
padding:10px;
margin-top:6px;
margin-bottom:12px;
border-radius:10px;
border:1px solid rgba(0,0,0,0.2);
}

.btn{
display:inline-block;
padding:12px 16px;
border-radius:999px;
background:#111;
color:#fff;
border:none;
cursor:pointer;
font-weight:900;
font-size:13px;
}

.color-container{
display:flex;
gap:15px;
margin:10px 0;
}

.color-dot{
width:30px;
height:30px;
border-radius:50%;
cursor:pointer;
border:2px solid #ddd;
transition:0.3s;
}

.color-dot.active{
border:3px solid black;
transform:scale(1.2);
}

@media(max-width:980px){
.grid{grid-template-columns:1fr;}
.details{position:relative;top:0;}
}
</style>
</head>

<body>

<header>
<div class="brand">VEIDAHI INTIMATES</div>
</header>

<div class="wrap">

<a class="back" href="index.html">← Back to Home</a>

<h1>Camisole</h1>

<div class="sub">
Soft, stretchable and designed for everyday comfort with a flattering fit.
</div>

<div class="grid">

<div>
<img id="mainImage" width="100%" style="border-radius:18px;">
<div class="gallery" id="thumbs"></div>
</div>

<div class="details">

<p class="price">₹133</p>

<div class="combo-box">
<h3>3 Piece Combo Offer</h3>
<p><del>₹399</del> ₹299</p>
<p style="color:#d2235b;font-weight:700;">Save ₹100</p>
<button class="btn" onclick="selectCombo()">Select Combo</button>
</div>

<div class="offer">
Single → ₹249 | Combo → ₹418
</div>

<label>Choose Color</label>
<div class="color-container" id="colorIcons"></div>

<label>Select Size</label>
<select id="sizeSelect">
<option>32</option>
<option>34</option>
<option>36</option>
<option>38</option>
<option>40</option>
</select>

<label>Your Name</label>
<input type="text" id="custName">

<label>Phone Number</label>
<input type="text" id="custPhone">

<label>Address</label>
<input type="text" id="custAddress">

<button class="btn" onclick="orderNow()">Place Order</button>

</div>
</div>

</div>

<script>

let isCombo = false;

/* IMAGES */
const images = {
red:["./p2-new-red-1.jpg","./p2-new-red-2.jpg","./p2-new-red-3.jpg","./p2-new-red-4.jpg"],
grey:["./p2-new-grey-1.jpg","./p2-new-grey-2.jpg","./p2-new-grey-3.jpg","./p2-new-grey-4.jpg"],
brown:["./p2-new-brown-1.jpg","./p2-new-brown-2.jpg","./p2-new-brown-3.jpg","./p2-new-brown-4.jpg"]
};

const mainImage = document.getElementById("mainImage");
const thumbs = document.getElementById("thumbs");
const colorIcons = document.getElementById("colorIcons");

let currentColor = "red";

/* LOAD IMAGES */
function loadImages(color){
currentColor = color;
thumbs.innerHTML = "";

images[color].forEach(function(img,index){
if(index===0){ mainImage.src = img; }
const t = document.createElement("img");
t.src = img;
t.onclick = function(){ mainImage.src = img; };
thumbs.appendChild(t);
});
}

loadImages("red");

/* SELECT COMBO */
function selectCombo(){
isCombo = true;
alert("2 Piece Combo Selected ✅");
}

/* ORDER FUNCTION */
function orderNow(){

const name = document.getElementById("custName").value;
const phone = document.getElementById("custPhone").value;
const address = document.getElementById("custAddress").value;
const size = document.getElementById("sizeSelect").value;

if(name==="" || phone==="" || address===""){
alert("Please fill all details");
return;
}

const orderID = "VI" + Math.floor(Math.random()*100000);

let finalPrice = isCombo ? 418 : 249;
let type = isCombo ? "2 Piece Combo" : "Single Piece";

const message =
"🧾 VEIDAHI INTIMATES%0A"+
"Order ID: "+orderID+"%0A"+
"Product: Camisole%0A"+
"Type: "+type+"%0A"+
"Color: "+currentColor+"%0A"+
"Size: "+size+"%0A"+
"Price: ₹"+finalPrice+"%0A%0A"+
"Name: "+name+"%0A"+
"Phone: "+phone+"%0A"+
"Address: "+address;

window.open("https://wa.me/918750020203?text="+message,"_blank");
}

</script>

</body>
</html>
