<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Camisole</title>

<style>
body{
  margin:0;
  font-family:Arial, sans-serif;
  background:#f5f5f5;
}

.container{
  display:flex;
  gap:50px;
  max-width:1100px;
  margin:60px auto;
  padding:30px;
  background:white;
  box-shadow:0 5px 20px rgba(0,0,0,0.08);
  border-radius:10px;
}

.left{width:50%;}
.right{width:50%;}

#mainImage{
  width:100%;
  border-radius:8px;
  transition:0.4s;
}
#mainImage:hover{transform:scale(1.03);}

.thumbs{
  display:flex;
  gap:10px;
  margin-top:15px;
}

.thumbs img{
  width:70px;
  cursor:pointer;
  border-radius:6px;
  border:2px solid transparent;
}

.color-icons{
  display:flex;
  gap:12px;
  margin-top:10px;
}

.color-dot{
  width:30px;
  height:30px;
  border-radius:50%;
  cursor:pointer;
  border:2px solid #ddd;
}

.color-dot.active{
  border:3px solid black;
  transform:scale(1.2);
}

.price{
  font-size:20px;
  margin:10px 0;
}

.combo-box{
  background:#fff5f8;
  padding:20px;
  border-radius:15px;
  margin-top:20px;
  text-align:center;
  box-shadow:0 8px 20px rgba(0,0,0,0.08);
}

.combo-box h3{
  margin-bottom:10px;
  color:#b3003c;
}

.combo-box del{
  color:gray;
  margin-right:8px;
}

select,input{
  padding:10px;
  margin-top:10px;
  width:220px;
}

button{
  margin-top:15px;
  padding:12px;
  width:220px;
  background:black;
  color:white;
  border:none;
  cursor:pointer;
  border-radius:5px;
}
</style>
</head>

<body>

<div class="container">

<div class="left">
  <img id="mainImage" src="">
  <div class="thumbs" id="thumbs"></div>
</div>

<div class="right">

<h2>Premium Camisole</h2>

<p class="price"><b>Price:</b> ₹135</p>

<div style="margin:8px 0;">★★★★★ (4.8/5 • 124 Reviews)</div>

<p id="stockStatus" style="color:green;font-weight:bold;">✔ In Stock</p>

<p style="font-size:13px;">🚚 Free Delivery in 3-5 Days | Easy Returns</p>

<button onclick="toggleWishlist()" id="wishBtn"
style="background:#fff;color:black;border:1px solid #ccc;">
♡ Add to Wishlist
</button>

<div style="margin-top:15px;">
<b>Product Description:</b><br>
Elegant stretch camisole for daily comfort and smooth fit.
</div>

<div class="combo-box">
<h3>3 Set Combo Offer</h3>
<p><del>₹405</del> ₹299</p>
<p>Save ₹106</p>
<button onclick="orderCombo()">Buy 3 Set Combo</button>
</div>

<label><b>Choose Color:</b></label>
<div class="color-icons" id="colorIcons"></div>

<br>

<label>Select Size:</label><br>
<select id="sizeSelect">
<option>32</option>
<option>34</option>
<option>36</option>
<option>38</option>
<option>40</option>
</select>

<br>

<input type="text" id="custName" placeholder="Your Name">
<input type="text" id="custPhone" placeholder="Phone Number">
<input type="text" id="custAddress" placeholder="Address">

<button onclick="orderNow()">Order on WhatsApp</button>

</div>
</div>

<script>

const images = {
red:["p2-new-red-1.jpg","p2-new-red-2.jpg","p2-new-red-3.jpg","p2-new-red-4.jpg"],
grey:["p2-new-grey-1.jpg","p2-new-grey-2.jpg","p2-new-grey-3.jpg","p2-new-grey-4.jpg"],
brown:["p2-new-brown-1.jpg","p2-new-brown-2.jpg","p2-new-brown-3.jpg","p2-new-brown-4.jpg"]
};

const mainImage = document.getElementById("mainImage");
const thumbs = document.getElementById("thumbs");
const colorIcons = document.getElementById("colorIcons");

let currentColor = "red";

function loadImages(color){
currentColor = color;
thumbs.innerHTML = "";

images[color].forEach(function(img,index){
if(index===0){ mainImage.src = img; }

const t = document.createElement("img");
t.src = img;
t.onclick = function(){ mainImage.src = img; };
thumbs.appendChild(t);
});

highlightActive(color);
}

const colorMap = { red:"#d10000", grey:"#777", brown:"#5a3e2b" };

Object.keys(images).forEach(color=>{
const dot = document.createElement("div");
dot.classList.add("color-dot");
dot.style.background = colorMap[color];
dot.setAttribute("data-color", color);
dot.onclick = function(){ loadImages(color); };
colorIcons.appendChild(dot);
});

function highlightActive(activeColor){
document.querySelectorAll(".color-dot").forEach(dot=>{
dot.classList.remove("active");
});
const active = document.querySelector('[data-color="'+activeColor+'"]');
if(active){ active.classList.add("active"); }
}

loadImages("red");

/* ===== ORDER FUNCTION ===== */

function orderNow(){

const name = document.getElementById("custName").value.trim();
const phone = document.getElementById("custPhone").value.trim();
const address = document.getElementById("custAddress").value.trim();
const size = document.getElementById("sizeSelect").value;

if(name === "" || phone === "" || address === ""){
alert("Please fill all details");
return;
}

const productName = document.querySelector("h2").innerText;
const singlePrice = "₹135";
const comboPrice = "₹299";

const message =
"🛍️ NEW ORDER 🛍️\n\n"+
"📌 Product: " + productName + "\n"+
"🎨 Color: " + currentColor + "\n"+
"📏 Size: " + size + "\n"+
"💰 Single Price: " + singlePrice + "\n"+
"🔥 Combo Price: " + comboPrice + "\n\n"+
"👤 Name: " + name + "\n"+
"📞 Phone: " + phone + "\n"+
"📍 Address: " + address;

const url = "https://wa.me/918750020203?text=" + encodeURIComponent(message);

window.open(url, "_blank");
}

/* ===== WISHLIST ===== */

function toggleWishlist(){
const btn = document.getElementById("wishBtn");
if(btn.innerHTML.includes("♡")){
btn.innerHTML="♥ Added to Wishlist";
btn.style.color="red";
}else{
btn.innerHTML="♡ Add to Wishlist";
btn.style.color="black";
}
}
function orderCombo(){

const size = document.getElementById("sizeSelect").value;

const message =
"🛍️ COMBO ORDER 🛍️\n\n"+
"📌 Product: Premium Camisole\n"+
"🎨 Color: " + currentColor + "\n"+
"📏 Size: " + size + "\n"+
"🔥 Combo Price: ₹299";

const url = "https://wa.me/918750020203?text=" + encodeURIComponent(message);

window.open(url, "_blank");

}
</script>
</body>
</html>
