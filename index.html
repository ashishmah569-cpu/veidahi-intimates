<style>

:root{
--primary:#b3003c;
--dark:#111;
--soft:#fff5f8;
}

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
font-family:'Poppins',sans-serif;
background:#fff;
color:#111;
}

nav{
background:#fff;
padding:20px 60px;
display:flex;
justify-content:space-between;
align-items:center;
box-shadow:0 8px 25px rgba(0,0,0,0.05);
}

nav h2{
font-weight:800;
letter-spacing:2px;
}

section{
padding:80px 20px;
text-align:center;
}

section h2{
font-size:30px;
margin-bottom:40px;
}

.hero{
height:90vh;
background:url("hero.jpg") center/cover no-repeat;
display:flex;
justify-content:center;
align-items:center;
flex-direction:column;
color:white;
text-shadow:0 5px 20px rgba(0,0,0,0.5);
}

.hero h1{
font-size:55px;
font-weight:800;
}

.hero p{
margin-top:10px;
}

.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
gap:25px;
max-width:1200px;
margin:auto;
}

.card{
background:white;
padding:15px;
border-radius:20px;
box-shadow:0 12px 30px rgba(0,0,0,0.08);
transition:.3s;
}

.card:hover{
transform:translateY(-8px);
}

.card img{
width:100%;
height:320px;
object-fit:cover;
border-radius:15px;
}

.card h3{
margin-top:10px;
font-size:16px;
}

.soft{
background:var(--soft);
}

.feature-box{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
gap:30px;
max-width:1000px;
margin:auto;
}

.feature{
background:white;
padding:30px;
border-radius:20px;
box-shadow:0 8px 25px rgba(0,0,0,0.06);
}

.review{
background:white;
padding:25px;
border-radius:20px;
box-shadow:0 8px 25px rgba(0,0,0,0.06);
}

footer{
background:#111;
color:white;
padding:25px;
text-align:center;
}
/* NEW ARRIVALS MANUAL SLIDER */

.arrival-slider{
  overflow-x:auto;
  scroll-behavior:smooth;
}

.arrival-track{
  display:flex;
  gap:20px;
  padding:10px 0;
}

.arrival-track .card{
  min-width:260px;
  flex-shrink:0;
}

/* MINI SLIDER INSIDE CARD */

.mini-slider{
  width:100%;
  overflow-x:auto;
  scroll-snap-type:x mandatory;
}

.mini-track{
  display:flex;
}

.mini-track img{
  min-width:100%;
  height:320px;
  object-fit:cover;
  border-radius:15px;
  scroll-snap-align:start;
}</head>
