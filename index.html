<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Veidahi Intimates | Luxury Lingerie</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;800&display=swap" rel="stylesheet">

<style>

:root{
--primary:#b3003c;
--soft:#fff5f8;
}

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
font-family:'Poppins',sans-serif;
background:#fff;
color:#111;
}

nav{
background:#fff;
padding:20px 60px;
display:flex;
justify-content:space-between;
align-items:center;
box-shadow:0 8px 25px rgba(0,0,0,0.05);
}

nav h2{
font-weight:800;
letter-spacing:2px;
}

section{
padding:80px 20px;
text-align:center;
}

section h2{
font-size:30px;
margin-bottom:40px;
}

/* HERO */

.hero{
height:90vh;
background:url("hero.jpg") center/cover no-repeat;
display:flex;
justify-content:center;
align-items:center;
flex-direction:column;
color:white;
text-shadow:0 5px 20px rgba(0,0,0,0.5);
}

.hero h1{
font-size:55px;
font-weight:800;
}

.hero p{
margin-top:10px;
}

/* GRID */

.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
gap:25px;
max-width:1200px;
margin:auto;
}

.card{
background:white;
padding:15px;
border-radius:20px;
box-shadow:0 12px 30px rgba(0,0,0,0.08);
transition:.3s;
cursor:pointer;
text-align:center;
}

.card:hover{
transform:translateY(-8px);
}

/* IMAGE SWITCH FIX */

.product{
position:relative;
}

.product img{
position:absolute;
width:100%;
height:320px;
object-fit:cover;
border-radius:15px;
opacity:0;
transition:.4s ease;
}

.product img.active{
opacity:1;
position:relative;
}

/* SECTION BG */

.soft{
background:var(--soft);
}

/* FEATURES */

.feature-box{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
gap:30px;
max-width:1000px;
margin:auto;
}

.feature{
background:white;
padding:30px;
border-radius:20px;
box-shadow:0 8px 25px rgba(0,0,0,0.06);
}

.review{
background:white;
padding:25px;
border-radius:20px;
box-shadow:0 8px 25px rgba(0,0,0,0.06);
}

footer{
background:#111;
color:white;
padding:25px;
text-align:center;
}

@media(max-width:768px){
.hero h1{
font-size:35px;
}
}

</style>
</head>

<body>

<nav>
<h2>VEIDAHI</h2>
</nav>

<section class="hero">
<h1>Luxury Lingerie</h1>
<p>Confidence begins underneath</p>
</section>

<!-- NEW ARRIVALS -->

<section class="soft">
<h2>New Arrivals</h2>

<div class="grid">

<div class="card product">
<img src="na1-1.jpg" class="active">
<img src="na1-2.jpg">
</div>

<div class="card product">
<img src="na2-1.jpg" class="active">
<img src="na2-2.jpg">
</div>

<div class="card product">
<img src="na3-1.jpg" class="active">
<img src="na3-2.jpg">
</div>

<div class="card product">
<img src="na4-1.jpg" class="active">
<img src="na4-2.jpg">
</div>

<div class="card product">
<img src="na5-1.jpg" class="active">
<img src="na5-2.jpg">
</div>

<div class="card product">
<img src="na6-1.jpg" class="active">
<img src="na6-2.jpg">
</div>

</div>
</section>

<!-- PRODUCTS -->

<section>
<h2>Our Collection</h2>

<div class="grid">

<div class="card product">
<img src="p1-burgundy-1.jpg" class="active">
<img src="p1-green-1.jpg">
<img src="p1-red-1.jpg">
</div>

<div class="card product">
<img src="p2-new-brown-1.jpg" class="active">
<img src="p2-new-grey-1.jpg">
<img src="p2-new-red-1.jpg">
</div>

</div>
</section>

<footer>
© 2026 Veidahi Intimates | Delhi
</footer>

<script>

/* UNIVERSAL IMAGE SWITCH */

document.querySelectorAll(".product").forEach(product=>{

let images = product.querySelectorAll("img");
let index = 0;

product.addEventListener("click",()=>{

images[index].classList.remove("active");
index = (index + 1) % images.length;
images[index].classList.add("active");

});

});

</script>

</body>
</html>
