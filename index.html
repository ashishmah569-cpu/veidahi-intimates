<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Veidahi Intimates | Luxury Lingerie</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;800&display=swap" rel="stylesheet">

<style>

:root{
--primary:#b3003c;
--soft:#fff5f8;
}

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
font-family:'Poppins',sans-serif;
background:#fff;
color:#111;
}

nav{
background:#fff;
padding:20px 60px;
display:flex;
justify-content:space-between;
align-items:center;
box-shadow:0 8px 25px rgba(0,0,0,0.05);
}

section{
padding:80px 20px;
text-align:center;
}

section h2{
font-size:30px;
margin-bottom:40px;
}

.hero{
height:90vh;
background:url("hero.jpg") center/cover no-repeat;
display:flex;
justify-content:center;
align-items:center;
flex-direction:column;
color:white;
text-shadow:0 5px 20px rgba(0,0,0,0.5);
}

.hero h1{
font-size:55px;
}

.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
gap:25px;
max-width:1200px;
margin:auto;
}

.card{
background:white;
padding:15px;
border-radius:20px;
box-shadow:0 12px 30px rgba(0,0,0,0.08);
cursor:pointer;
text-align:center;
}

.product{
position:relative;
width:100%;
height:320px;
overflow:hidden;
border-radius:15px;
}

.product img{
width:100%;
height:100%;
object-fit:cover;
position:absolute;
top:0;
left:0;
opacity:0;
transition:0.4s ease;
}

.product img.active{
opacity:1;
}

.card h3{
margin-top:15px;
font-size:18px;
}

.price{
font-weight:600;
margin-top:15px;
}

.desc{
font-size:14px;
color:#666;
margin-top:5px;
}

.soft{
background:var(--soft);
}

footer{
background:#111;
color:white;
padding:25px;
text-align:center;
}

/* POPUP */

.product-popup{
display:none;
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.6);
justify-content:center;
align-items:center;
z-index:1000;
}

.popup-content{
background:white;
padding:30px;
border-radius:20px;
width:90%;
max-width:400px;
text-align:center;
position:relative;
}

.popup-content img{
width:100%;
border-radius:15px;
margin-bottom:20px;
}

.close-popup{
position:absolute;
top:10px;
right:15px;
font-size:22px;
cursor:pointer;
}

</style>
</head>

<body>

<nav>
<h2>VEIDAHI</h2>
</nav>

<section class="hero">
<h1>Luxury Lingerie</h1>
<p>Confidence begins underneath</p>
</section>

<section>
<h2>Our Collection</h2>

<div class="grid">

<div class="card">
<div class="product">
<img src="p1-burgundy-1.jpg" class="active">
<img src="p1-green-1.jpg">
<img src="p1-red-1.jpg">
</div>
<h3>Luxury Set 1</h3>
<p class="price">₹1,899</p>
<p class="desc">Available in Burgundy, Green, Red.</p>
</div>

<div class="card">
<div class="product">
<img src="p2-new-brown-1.jpg" class="active">
<img src="p2-new-grey-1.jpg">
<img src="p2-new-red-1.jpg">
</div>
<h3>Luxury Set 2</h3>
<p class="price">₹2,099</p>
<p class="desc">Available in Brown, Grey, Red.</p>
</div>

</div>
</section>

<!-- POPUP -->

<div class="product-popup" id="productPopup">
  <div class="popup-content">
    <span class="close-popup">&times;</span>
    <img src="" id="popupImage">
    <h2 id="popupTitle"></h2>
    <p id="popupPrice"></p>
    <p id="popupDesc"></p>
  </div>
</div>

<footer>
© 2026 Veidahi Intimates | Delhi
</footer>

<script>

// IMAGE SWITCH
document.querySelectorAll(".card .product").forEach(product=>{
let images = product.querySelectorAll("img");
let index = 0;

product.addEventListener("click",(e)=>{
e.stopPropagation();
images[index].classList.remove("active");
index = (index + 1) % images.length;
images[index].classList.add("active");
});
});

// POPUP
const popup = document.getElementById("productPopup");
const popupImage = document.getElementById("popupImage");
const popupTitle = document.getElementById("popupTitle");
const popupPrice = document.getElementById("popupPrice");
const popupDesc = document.getElementById("popupDesc");
const closePopup = document.querySelector(".close-popup");

document.querySelectorAll(".grid .card").forEach(card=>{
card.addEventListener("click",()=>{
let img = card.querySelector(".product img.active").src;
let title = card.querySelector("h3").innerText;
let price = card.querySelector(".price").innerText;
let desc = card.querySelector(".desc").innerText;

popupImage.src = img;
popupTitle.innerText = title;
popupPrice.innerText = price;
popupDesc.innerText = desc;

popup.style.display = "flex";
});
});

closePopup.addEventListener("click",()=>{
popup.style.display = "none";
});

window.addEventListener("click",(e)=>{
if(e.target === popup){
popup.style.display = "none";
}
});

</script>

</body>
</html>
